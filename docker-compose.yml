version: '3.8'

services:
  truthlens-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: truthlens-backend-container
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - DATABASE_URL=file:/app/prisma/prod.db
      - JWT_SECRET=prod_jwt_secret_token_signature_key_2026
      - JWT_REFRESH_SECRET=prod_jwt_refresh_secret_token_signature_key_2026
    volumes:
      - db-data:/app/prisma
      - uploads-data:/app/uploads
    restart: always

volumes:
  db-data:
  uploads-data:
